name: Go CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: "1.24"

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test ./...

    - name: Build application
      run: go build ./...
